<svg width="819" height="698" viewBox="0 0 819 698" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>
@keyframes topAnim {
  100% {
    transform: translateY(0px);
    stroke:#F8B32A

  }
  99% {
    transform: translateY(0px);
    stroke:#ffffff

  }

  0% {
    transform: translateY(-80px);
    stroke:#ffffff
  }
}

.top-anim {
  transform-box: fill-box;
  transform-origin: center;
  animation: topAnim 2s ease-in-out 1 forwards;
}


@keyframes topAnimFont {
  100% {
    transform: translateY(0px);
    

  }
  99% {
    transform: translateY(0px);
   

  }

  0% {
    transform: translateY(-80px);
    
  }
}

.top-anim-font {
  transform-box: fill-box;
  transform-origin: center;
  animation: topAnimFont 2s ease-in-out 1 forwards;
}
@keyframes leftAnim {
  100% {
    transform:translateX(0px) translateY(0px);
    stroke:#F8B32A

  }
  99% {
    transform:translateX(0px) translateY(0px);
    stroke:#ffffff

  }

  0% {
    transform:translateX(-64px) translateY(36px);
    stroke:#ffffff
  }
}



.left-anim {
  transform-box: fill-box;
  transform-origin: center;
  animation: leftAnim 2s ease-in-out 1 forwards;
}

@keyframes rightAnim {
  100% {
    transform:translateX(0px) translateY(0px);
    stroke:#F8B32A
    
  }
  99% {
    transform:translateX(0px) translateY(0px);
    stroke:#ffffff
    
  }

 0% {
    transform:translateX(64px) translateY(36px);
    stroke:#ffffff
  }
}

.right-anim {
  transform-box: fill-box;
  transform-origin: center;
  animation: rightAnim 2s ease-in-out 1 forwards;
}
@keyframes colorAnim {
  0%,99%{
    stroke:#ffffff
  }
  100%{
    stroke:#F8B32A
  }
}
.color-anim{
  animation: colorAnim 2s ease-in-out 1 forwards;
}

</style>
