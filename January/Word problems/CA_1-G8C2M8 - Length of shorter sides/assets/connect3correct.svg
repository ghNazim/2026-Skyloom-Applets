<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="redSquare" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b71c1c"/>
      <stop offset="100%" style="stop-color:#c62828"/>
    </linearGradient>
    <linearGradient id="yellowSquare" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9a825"/>
      <stop offset="100%" style="stop-color:#fbc02d"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="transparent"/>
  
  <!-- Red Square on AC -->
  <rect x="80" y="30" width="130" height="130" fill="url(#redSquare)" stroke="#4caf50" stroke-width="2"/>
  <text x="145" y="90" fill="white" font-size="12" text-anchor="middle" font-family="Arial">AC² = 338 cm²</text>
  
  <!-- Yellow Square on BC -->
  <rect x="260" y="100" width="50" height="50" fill="url(#yellowSquare)" stroke="#4caf50" stroke-width="2"/>
  <text x="285" y="185" fill="#ffc107" font-size="12" text-anchor="middle" font-family="Arial">BC² = 7² = 49</text>
  
  <!-- Triangle ABC -->
  <polygon points="210,160 310,160 310,110" fill="#1a2a3a" stroke="#4caf50" stroke-width="3"/>
  
  <!-- Right angle marker -->
  <rect x="300" y="150" width="10" height="10" fill="none" stroke="#4caf50" stroke-width="2"/>
  
  <!-- Labels -->
  <text x="200" y="175" fill="#ef5350" font-size="14" font-weight="bold" font-family="Arial">A</text>
  <text x="315" y="175" fill="#4fc3f7" font-size="14" font-weight="bold" font-family="Arial">B</text>
  <text x="315" y="105" fill="#4fc3f7" font-size="14" font-weight="bold" font-family="Arial">C</text>
  
  <!-- Pythagoras formula confirmed -->
  <text x="200" y="220" fill="#4caf50" font-size="14" text-anchor="middle" font-family="Arial" font-weight="bold">AB² = AC² - BC² ✓</text>
  
  <!-- Side a label -->
  <text x="255" y="195" fill="white" font-size="14" text-anchor="middle" font-family="Arial">a = ?</text>
</svg>
