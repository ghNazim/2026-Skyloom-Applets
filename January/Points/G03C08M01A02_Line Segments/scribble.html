<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scribble Connector</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --primary: #3b82f6;
            --accent: #ef4444;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            font-size: 1.5rem;
            color: var(--text);
        }

        p {
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 1.5rem;
        }

        #canvas-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 100 / 70;
            border: 2px solid var(--border);
            border-radius: 8px;
            background-color: #fff;
            overflow: hidden;
            touch-action: none; /* Prevents scrolling while drawing */
        }

        svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .point {
            fill: var(--primary);
            transition: r 0.2s ease;
        }

        .point.active {
            fill: #10b981;
            r: 3;
        }

        #current-path {
            fill: none;
            stroke: var(--text);
            stroke-width: 0.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .final-path {
            fill: none;
            stroke: var(--primary);
            stroke-width: 0.6;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0.7;
        }

        .status-msg {
            margin-top: 1rem;
            font-weight: 500;
            min-height: 1.5rem;
        }

        .status-error { color: var(--accent); }
        .status-success { color: #10b981; }

        .controls {
            margin-top: 1rem;
        }

        button {
            background-color: var(--text);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Scribble Connector</h1>
    <p>Start drawing from one blue point and release your mouse on the other.</p>

    <div id="canvas-wrapper">
        <svg id="canvas" viewBox="0 0 100 70">
            <!-- Points are at (25, 35) and (75, 35) - Distance 50, horizontal -->
            <circle id="point-start" class="point" cx="25" cy="35" r="2" />
            <circle id="point-end" class="point" cx="75" cy="35" r="2" />
            
            <!-- Group for finished paths -->
            <g id="paths-container"></g>
            
            <!-- Currently active path -->
            <path id="current-path" d="" />
        </svg>
    </div>

    <div id="status" class="status-msg"></div>

    <div class="controls">
        <button id="clear-btn">Clear All</button>
    </div>
</div>

<script>
    const svg = document.getElementById('canvas');
    const currentPath = document.getElementById('current-path');
    const pathsContainer = document.getElementById('paths-container');
    const status = document.getElementById('status');
    const clearBtn = document.getElementById('clear-btn');

    const p1 = { x: 25, y: 35 };
    const p2 = { x: 75, y: 35 };
    const THRESHOLD = 5; // Distance threshold to snap to points

    let isDrawing = false;
    let pathData = "";
    let startPointNode = null;

    function getSVGCoords(e) {
        const pt = svg.createSVGPoint();
        if (e.touches && e.touches.length > 0) {
            pt.x = e.touches[0].clientX;
            pt.y = e.touches[0].clientY;
        } else {
            pt.x = e.clientX;
            pt.y = e.clientY;
        }
        const cursorPt = pt.matrixTransform(svg.getScreenCTM().inverse());
        return { x: cursorPt.x, y: cursorPt.y };
    }

    function getDistance(x1, y1, x2, y2) {
        return Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
    }

    function startDrawing(e) {
        const coords = getSVGCoords(e);
        
        const dist1 = getDistance(coords.x, coords.y, p1.x, p1.y);
        const dist2 = getDistance(coords.x, coords.y, p2.x, p2.y);

        let activeTarget = null;
        if (dist1 < THRESHOLD) {
            activeTarget = p1;
            startPointNode = document.getElementById('point-start');
        } else if (dist2 < THRESHOLD) {
            activeTarget = p2;
            startPointNode = document.getElementById('point-end');
        }

        if (activeTarget) {
            isDrawing = true;
            pathData = `M ${activeTarget.x} ${activeTarget.y}`;
            currentPath.setAttribute('d', pathData);
            status.textContent = "Drawing...";
            status.className = "status-msg";
            startPointNode.classList.add('active');
        } else {
            status.textContent = "Start near a point to draw!";
            status.className = "status-msg status-error";
        }
    }

    function draw(e) {
        if (!isDrawing) return;
        
        const coords = getSVGCoords(e);
        pathData += ` L ${coords.x.toFixed(2)} ${coords.y.toFixed(2)}`;
        currentPath.setAttribute('d', pathData);
    }

    function stopDrawing(e) {
        if (!isDrawing) return;
        
        const coords = getSVGCoords(e);
        
        // Find which point we didn't start from
        const targetPoint = (startPointNode.id === 'point-start') ? p2 : p1;
        const targetNode = (startPointNode.id === 'point-start') ? 
                            document.getElementById('point-end') : 
                            document.getElementById('point-start');

        const distToTarget = getDistance(coords.x, coords.y, targetPoint.x, targetPoint.y);

        if (distToTarget < THRESHOLD) {
            // Success: Snap to end point and save path
            pathData += ` L ${targetPoint.x} ${targetPoint.y}`;
            
            const newPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
            newPath.setAttribute('d', pathData);
            newPath.setAttribute('class', 'final-path');
            pathsContainer.appendChild(newPath);
            
            status.textContent = "Connected successfully!";
            status.className = "status-msg status-success";
        } else {
            // Failure
            status.textContent = "Connection failed. Must end at the other point.";
            status.className = "status-msg status-error";
        }

        // Reset
        isDrawing = false;
        pathData = "";
        currentPath.setAttribute('d', "");
        document.querySelectorAll('.point').forEach(p => p.classList.remove('active'));
    }

    // Event Listeners
    svg.addEventListener('mousedown', startDrawing);
    window.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', stopDrawing);

    // Touch Support
    svg.addEventListener('touchstart', (e) => {
        e.preventDefault();
        startDrawing(e);
    }, { passive: false });
    window.addEventListener('touchmove', (e) => {
        if (isDrawing) e.preventDefault();
        draw(e);
    }, { passive: false });
    window.addEventListener('touchend', stopDrawing);

    clearBtn.addEventListener('click', () => {
        pathsContainer.innerHTML = "";
        status.textContent = "Cleared.";
        status.className = "status-msg";
    });
</script>

</body>
</html>
